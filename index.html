<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Meeting Room Scheduler</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>📅 Smart Scheduler Pro</h1>

    <div class="card">
        <h2>Add Meeting</h2>
        <div class="input-group">
            <input type="text" id="name" placeholder="Meeting Title...">
            <div class="time-picker-container">
                <div class="time-box">
                    <label>Starts At</label>
                    <div class="select-row">
                        <select id="sH"></select>
                        <select id="sP"><option>AM</option><option>PM</option></select>
                    </div>
                </div>
                <div class="time-box">
                    <label>Ends At</label>
                    <div class="select-row">
                        <select id="eH"></select>
                        <select id="eP"><option>AM</option><option>PM</option></select>
                    </div>
                </div>
            </div>
            <button class="add-btn" onclick="addMeeting()">➕ Add to Queue</button>
        </div>
    </div>

    <div class="card">
        <h2>All Requests</h2>
        <table>
            <thead><tr><th>Name</th><th>Window</th><th>Action</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
        <button class="schedule-btn" onclick="processSchedule()">🚀 Optimize & Generate Gantt Chart</button>
    </div>

    <div class="result-layout">
        <div class="card res-card" style="border-top: 4px solid var(--success);">
            <h3 style="color: var(--success)">✅ Selected</h3>
            <ul id="selList"></ul>
        </div>
        <div class="card res-card" style="border-top: 4px solid var(--danger);">
            <h3 style="color: var(--danger)">❌ Rejected</h3>
            <ul id="rejList"></ul>
        </div>
    </div>

    <div class="card">
        <h2>📊 Gantt Chart Representation</h2>
        <div class="timeline-wrapper">
            <div id="timeline" class="timeline-container"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
